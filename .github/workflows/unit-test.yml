name: Unit Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install system dependencies
        run: sudo apt-get install -y libvirt-dev pkg-config whois

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -v -count=1 ./...
